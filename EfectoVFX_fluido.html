<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aetheryon Pro - ZERO DEPENDENCY LAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050508; font-family: 'Outfit', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #ui { position: absolute; top: 20px; right: 20px; width: 240px; background: rgba(10, 10, 15, 0.9); color: #00f2ff; padding: 20px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(10px); pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
        .stats { font-size: 9px; opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <h1>Aetheryon Lab</h1>
        <div class="stats">NAVIER-STOKES CORE // 64x64 GRID</div>
        <p style="font-size:11px; color:white; opacity:0.7; margin-top:15px;">Mueve el ratón para generar humo neón interactivo.</p>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // Resolución de la rejilla de fluidos
        const N = 64;
        const iter = 16;
        const size = (N + 2) * (N + 2);

        let s = new Float32Array(size);
        let density = new Float32Array(size);
        let Vx = new Float32Array(size);
        let Vy = new Float32Array(size);
        let Vx0 = new Float32Array(size);
        let Vy0 = new Float32Array(size);

        function IX(x, y) {
            x = Math.max(0, Math.min(x, N + 1));
            y = Math.max(0, Math.min(y, N + 1));
            return x + y * (N + 2);
        }

        function addDensity(x, y, amount) { density[IX(x, y)] += amount; }
        function addVelocity(x, y, px, py) {
            Vx[IX(x, y)] += px;
            Vy[IX(x, y)] += py;
        }

        function diffuse(b, x, x0, diff, dt) {
            let a = dt * diff * (N - 2) * (N - 2);
            lin_solve(b, x, x0, a, 1 + 6 * a);
        }

        function lin_solve(b, x, x0, a, c) {
            let cRecip = 1.0 / c;
            for (let k = 0; k < iter; k++) {
                for (let j = 1; j <= N; j++) {
                    for (let i = 1; i <= N; i++) {
                        x[IX(i, j)] = (x0[IX(i, j)] + a * (x[IX(i + 1, j)] + x[IX(i - 1, j)] + x[IX(i, j + 1)] + x[IX(i, j - 1)])) * cRecip;
                    }
                }
                set_bnd(b, x);
            }
        }

        function project(velocX, velocY, p, div) {
            for (let j = 1; j <= N; j++) {
                for (let i = 1; i <= N; i++) {
                    div[IX(i, j)] = -0.5 * (velocX[IX(i + 1, j)] - velocX[IX(i - 1, j)] + velocY[IX(i, j + 1)] - velocY[IX(i, j - 1)]) / N;
                    p[IX(i, j)] = 0;
                }
            }
            set_bnd(0, div); set_bnd(0, p);
            lin_solve(0, p, div, 1, 6);
            for (let j = 1; j <= N; j++) {
                for (let i = 1; i <= N; i++) {
                    velocX[IX(i, j)] -= 0.5 * (p[IX(i + 1, j)] - p[IX(i - 1, j)]) * N;
                    velocY[IX(i, j)] -= 0.5 * (p[IX(i, j + 1)] - p[IX(i, j - 1)]) * N;
                }
            }
            set_bnd(1, velocX); set_bnd(2, velocY);
        }

        function advect(b, d, d0, velocX, velocY, dt) {
            let i0, i1, j0, j1;
            let dtx = dt * (N - 2);
            let dty = dt * (N - 2);
            let s0, s1, t0, t1;
            let tmp1, tmp2, x, y;
            let Nfloat = N;
            let ifloat, jfloat;

            for (let j = 1; j <= N; j++) {
                for (let i = 1; i <= N; i++) {
                    tmp1 = dtx * velocX[IX(i, j)];
                    tmp2 = dty * velocY[IX(i, j)];
                    x = i - tmp1;
                    y = j - tmp2;
                    if (x < 0.5) x = 0.5; if (x > Nfloat + 0.5) x = Nfloat + 0.5;
                    i0 = Math.floor(x); i1 = i0 + 1.0;
                    if (y < 0.5) y = 0.5; if (y > Nfloat + 0.5) y = Nfloat + 0.5;
                    j0 = Math.floor(y); j1 = j0 + 1.0;
                    s1 = x - i0; s0 = 1.0 - s1;
                    t1 = y - j0; t0 = 1.0 - t1;
                    d[IX(i, j)] = s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) + s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
                }
            }
            set_bnd(b, d);
        }

        function set_bnd(b, x) {
            for (let i = 1; i <= N; i++) {
                x[IX(i, 0)] = b == 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
                x[IX(i, N + 1)] = b == 2 ? -x[IX(i, N)] : x[IX(i, N)];
                x[IX(0, i)] = b == 1 ? -x[IX(1, i)] : x[IX(1, i)];
                x[IX(N + 1, i)] = b == 1 ? -x[IX(N, i)] : x[IX(N, i)];
            }
            x[IX(0, 0)] = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
            x[IX(0, N + 1)] = 0.5 * (x[IX(1, N + 1)] + x[IX(0, N)]);
            x[IX(N + 1, 0)] = 0.5 * (x[IX(N, 0)] + x[IX(N + 1, 1)]);
            x[IX(N + 1, N + 1)] = 0.5 * (x[IX(N, N + 1)] + x[IX(N + 1, N)]);
        }

        function step() {
            diffuse(1, Vx0, Vx, 0.0001, 0.1);
            diffuse(2, Vy0, Vy, 0.0001, 0.1);
            project(Vx0, Vy0, Vx, Vy);
            advect(1, Vx, Vx0, Vx0, Vy0, 0.1);
            advect(2, Vy, Vy0, Vx0, Vy0, 0.1);
            project(Vx, Vy, Vx0, Vy0);
            diffuse(0, s, density, 0.0001, 0.1);
            advect(0, density, s, Vx, Vy, 0.1);
        }

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            step();
            
            const cellW = canvas.width / N;
            const cellH = canvas.height / N;

            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let j = 0; j < N; j++) {
                for (let i = 0; i < N; i++) {
                    const d = density[IX(i, j)];
                    if (d > 0.01) {
                        ctx.fillStyle = `rgba(0, 242, 255, ${Math.min(d, 0.8)})`;
                        ctx.fillRect(i * cellW, j * cellH, cellW + 1, cellH + 1);
                    }
                }
            }
            
            // Decaimiento
            for (let i = 0; i < size; i++) density[i] *= 0.99;

            requestAnimationFrame(render);
        }

        let pmx = 0, pmy = 0;
        window.onmousemove = (e) => {
            const i = Math.floor((e.clientX / window.innerWidth) * N);
            const j = Math.floor((e.clientY / window.innerHeight) * N);
            if (i > 0 && i < N && j > 0 && j < N) {
                addDensity(i, j, 5);
                addVelocity(i, j, (e.clientX - pmx) * 0.1, (e.clientY - pmy) * 0.1);
            }
            pmx = e.clientX; pmy = e.clientY;
        }

        render();
    </script>
</body>
</html>
